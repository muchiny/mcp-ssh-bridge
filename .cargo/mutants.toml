# cargo-mutants configuration
# https://mutants.rs/config-file.html

# Use nextest for faster test runs
test_tool = "nextest"

# Exclude files that are not worth mutating
exclude_globs = [
    "src/main.rs",           # CLI entry point
    "examples/**/*.rs",      # Examples
    "benches/**/*.rs",       # Benchmarks
]

# Skip calls that don't affect logic (logging)
skip_calls = [
    "debug",
    "info",
    "warn",
    "error",
    "trace",
]

# Use optimized profile for faster mutation testing
profile = "mutants"

# Exclude provably equivalent mutations:
# - `ToolHandler::output_kind` defaults to `OutputKind::RawText`, and
#   `RawText` is `#[default]` on the enum — any rewrite to
#   `Default::default()` produces the same value.
# - `StandardTool::scoped_paths` default returns `Vec::new()`; a `vec![]`
#   literal is the exact same empty allocation, hence equivalent.
# - `try_apply_yq`/`try_apply_jq` collapse to `let _ = ...; Ok(false)`
#   when the `jq` feature is OFF (default build), so a mutation
#   "replace ... with Ok(false)" produces an identical body.
examine_re = []
exclude_re = [
    "replace ToolHandler::output_kind .* with Default::default\\(\\)",
    "replace StandardTool::scoped_paths -> Vec<&str> with vec!\\[\\]",
    "replace try_apply_yq -> Result<bool> with Ok\\(false\\)",
    "replace try_apply_jq -> Result<bool> with Ok\\(false\\)",
    # `OutputCache::store` / `cleanup` use `now.duration_since(entry.created)
    # < self.ttl`. The mutations `< -> <=` and `< -> ==` only differ at the
    # exact ttl boundary, which requires a `Clock` abstraction to reach
    # deterministically — `Instant::now()` ignores `tokio::time::pause`.
    "replace < with <= in OutputCache::store",
    "replace < with <= in OutputCache::cleanup",
    "replace < with == in OutputCache::cleanup",
    # `floor_char_boundary` / `ceil_char_boundary` short-circuit on the
    # second condition (`!s.is_char_boundary(0)` and `_(s.len())` are
    # both `false` because byte 0 and byte len are *always* char
    # boundaries in Rust strings). The mutations `> -> >=` and `< -> <=`
    # therefore produce the same observable output as the original.
    "replace > with >= in floor_char_boundary",
    "replace < with <= in ceil_char_boundary",
    # `i -= 1` / `i += 1` mutated to `i /= 1` / `i *= 1` are no-ops on
    # any value (x*1 == x, x/1 == x). The loop body becomes infinite,
    # which would be caught by a tight per-call timeout — but the
    # current test infrastructure exercises `floor`/`ceil` indirectly
    # through `truncate_output` calls inside many other tests, all of
    # which then hang and trip a SIGTERM that flips the whole mutant
    # outcome to TIMEOUT instead of FAIL. Killing these properly
    # requires either factoring the loop out behind a `Clock`-style
    # bound, or wrapping every truncation test in a thread+recv
    # timeout — both out of scope for this batch.
    "replace -= with /= in floor_char_boundary",
    "replace \\+= with \\*= in ceil_char_boundary",
    # `DataReductionArgs::wants_tsv` is `#[cfg(feature = "jq")]`-gated.
    # Mutations on the body are equivalent in default builds because
    # the function is compiled out; killing them requires a `--features
    # jq` mutants run.
    "replace DataReductionArgs::wants_tsv -> bool with true",
    "replace DataReductionArgs::wants_tsv -> bool with false",
    # `Metrics::render_token_summary` guards (`total_calls > 0`,
    # `before > 0`, `total_kind > 0`) operate on `u64`. The mutation
    # `> -> <` is equivalent because no `u64` value satisfies `< 0`,
    # so the guarded block never runs — same observable behavior as
    # the original on the empty-state path.
    "replace > with < in Metrics::render_token_summary",
    # `AuditLogger::cleanup_old_files` compares file mtime to a
    # cutoff `< self.retain_days`. The mutation `< -> <=` only
    # differs at the *exact* cutoff timestamp — unreachable from a
    # deterministic test for the same reason as `OutputCache`:
    # `SystemTime`/`Utc::now` are real-time syscalls and the
    # filesystem mtime is not under test control.
    "replace < with <= in AuditLogger::cleanup_old_files",
    # `ConfigWatcher` uses `Instant::elapsed() < DEBOUNCE_DURATION` to
    # skip reloads that arrive within the debounce window, plus
    # `notify::EventKind` filters on a sync callback that runs on the
    # `notify` watcher thread. Both ride on real-time and a real
    # filesystem event source — killing the timing/filter mutations
    # deterministically requires either injecting a `Clock` or
    # spinning up a real `tempfile`-based fixture with carefully
    # ordered fs writes. Out of scope for this batch.
    "replace < with <= in ConfigWatcher::with_validator",
    "replace < with == in ConfigWatcher::with_validator",
    "replace && with || in ConfigWatcher::with_validator",
    "replace < with <= in ConfigWatcher::with_notifications",
    "replace < with == in ConfigWatcher::with_notifications",
    "replace && with || in ConfigWatcher::with_notifications",
    "replace == with != in ConfigWatcher::with_notifications",
]

# Examine groups for focused mutation testing:
# - `make mutants`      -> security module (src/security/)
# - `make mutants-db`   -> database command builder (src/domain/use_cases/database.rs)
# - `make mutants-full` -> entire codebase
