# cargo-mutants configuration
# https://mutants.rs/config-file.html

# Use nextest for faster test runs
test_tool = "nextest"

# Exclude files that are not worth mutating
exclude_globs = [
    "src/main.rs",           # CLI entry point
    "examples/**/*.rs",      # Examples
    "benches/**/*.rs",       # Benchmarks
]

# Skip calls that don't affect logic (logging)
skip_calls = [
    "debug",
    "info",
    "warn",
    "error",
    "trace",
]

# Use optimized profile for faster mutation testing
profile = "mutants"

# Exclude provably equivalent mutations:
# - `ToolHandler::output_kind` defaults to `OutputKind::RawText`, and
#   `RawText` is `#[default]` on the enum — any rewrite to
#   `Default::default()` produces the same value.
# - `StandardTool::scoped_paths` default returns `Vec::new()`; a `vec![]`
#   literal is the exact same empty allocation, hence equivalent.
# - `try_apply_yq`/`try_apply_jq` collapse to `let _ = ...; Ok(false)`
#   when the `jq` feature is OFF (default build), so a mutation
#   "replace ... with Ok(false)" produces an identical body.
examine_re = []
exclude_re = [
    "replace ToolHandler::output_kind .* with Default::default\\(\\)",
    "replace StandardTool::scoped_paths -> Vec<&str> with vec!\\[\\]",
    "replace try_apply_yq -> Result<bool> with Ok\\(false\\)",
    "replace try_apply_jq -> Result<bool> with Ok\\(false\\)",
    # `OutputCache::store` / `cleanup` use `now.duration_since(entry.created)
    # < self.ttl`. The mutations `< -> <=` and `< -> ==` only differ at the
    # exact ttl boundary, which requires a `Clock` abstraction to reach
    # deterministically — `Instant::now()` ignores `tokio::time::pause`.
    "replace < with <= in OutputCache::store",
    "replace < with <= in OutputCache::cleanup",
    "replace < with == in OutputCache::cleanup",
]

# Examine groups for focused mutation testing:
# - `make mutants`      -> security module (src/security/)
# - `make mutants-db`   -> database command builder (src/domain/use_cases/database.rs)
# - `make mutants-full` -> entire codebase
