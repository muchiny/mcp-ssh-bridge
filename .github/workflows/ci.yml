name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [format, lint]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --all-targets --all-features

  feature-powerset:
    name: Feature powerset
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: hack
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      # Limit to depth 1 (each feature individually) and exclude meta-features.
      # Full powerset of 22 features would be millions of builds; depth 2 was
      # ~150 builds × ~30s = >75min. Depth 1 = 18 builds = ~10 min.
      - run: cargo hack check --feature-powerset --depth 1 --no-dev-deps --exclude-features full,air-gapped,all-protocols,cloud

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      # Phase A: start the SSH test container and generate the integration
      # test config so the previously-#[ignore]'d tests in
      # ssh_integration.rs / sftp_integration.rs / e2e_docker.rs are picked
      # up by --include-ignored. Container is stopped in the always() step.
      - name: Start test SSH container
        run: |
          docker compose -f docker-compose.test.yml up -d --wait
          docker compose -f docker-compose.test.yml ps

      - name: Generate ssh_test_config.yaml fixture
        run: |
          cat > tests/ssh_test_config.yaml <<'EOF'
          # Auto-generated for CI by the coverage job. The local file is
          # gitignored. Points at the test-sshd container started by
          # docker-compose.test.yml.
          ssh_test:
            hostname: "127.0.0.1"
            port: 2222
            user: "testuser"
            auth:
              password: "testpass123"
            host_key_verification: "off"
            remote_test_dir: "/tmp/mcp-ssh-bridge-tests"
          EOF

      - name: Generate coverage (with integration tests)
        run: |
          cargo tarpaulin --engine llvm --all-features \
            --out xml --output-dir coverage \
            --fail-under 70 \
            --timeout 600 \
            --skip-clean \
            --exclude-files tests/e2e_raspberry.rs \
            -- --include-ignored \
               --skip rpi::

      - name: Stop test SSH container
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/cobertura.xml
          retention-days: 30

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1

  deny:
    name: Deny (advisories + licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
          config: .markdownlint.yaml
