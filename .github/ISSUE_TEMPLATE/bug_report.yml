name: Bug Report
description: Report a bug in mcp-ssh-bridge
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Configure host in config.yaml...
        2. Run tool ssh_exec...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages if any.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `mcp-ssh-bridge --version`
      placeholder: "mcp-ssh-bridge 1.7.0"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Usage mode
      options:
        - MCP (Claude Desktop / Claude Code)
        - CLI (command line)
        - Docker
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, config snippets (redact secrets), or logs.
    validations:
      required: false
