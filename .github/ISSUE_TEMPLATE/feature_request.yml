name: Feature Request
description: Suggest a new feature or tool
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case does it address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Which tool group does it belong to?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New tool
        - Enhancement to existing tool
        - New protocol adapter
        - Security / compliance
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative approaches have you considered?
    validations:
      required: false
